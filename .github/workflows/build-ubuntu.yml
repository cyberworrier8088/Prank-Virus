# This for github power using
name: Build Multi-OS Versions

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Prank-Virus-Ubuntu
            bin_path: target/release/Prank-Virus
          - os: windows-latest
            artifact_name: Prank-Virus-Windows
            bin_path: target/release/Prank-Virus.exe
          - os: macos-latest
            artifact_name: Prank-Virus-Mac
            bin_path: target/release/Prank-Virus

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Linux Graphics Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwayland-dev libxkbcommon-dev libx11-xcb-dev libxcursor-dev libxrandr-dev libxi-dev pkg-config

    - name: Build Release
      run: cargo build --release

    - name: Upload Executable
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.bin_path }}
